<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Tano Comidas - Las Flores</title> content="width=device-width, initial-scale=1.0">
    <imagen src="1772949748086.png"  alt="title">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rojo-fuego: #c62828;
            --dorado: #ffcc00;
            --oscuro: #0a0a0a;
            --gris-panel: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--oscuro);
            color: white;
            text-align: center;
            line-height: 1.6;
        }

        /* Encabezado Elegante */
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('logo.png'); /* Si tienes logo de fondo */
            background-size: cover;
            padding: 40px 20px;
            border-bottom: 3px solid var(--dorado);
        }

        .logo-img {
            width: 150px;
            border-radius: 50%;
            border: 3px solid var(--dorado);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            margin-bottom: 15px;
        }

        h1 { margin: 0; color: var(--dorado); font-size: 2.5rem; text-transform: uppercase; }
        .location { font-style: italic; color: #ccc; }
        .promo-badge { 
            display: inline-block; 
            background: var(--rojo-fuego); 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-weight: bold; 
            margin-top: 10px;
            animation: pulse 2s infinite;
        }

        /* Sección de Menú */
        .container { padding: 20px; max-width: 800px; margin: auto; }
        
        .menu-card {
            background: var(--gris-panel);
            border-radius: 15px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .menu-card img {
            width: 100%;
            display: block;
        }

        .card-title {
            padding: 15px;
            background: #222;
            color: var(--dorado);
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Botón de WhatsApp Flotante */
        .btn-whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 1000;
            text-decoration: none;
        }

        /* Reproductor de Audio Minimalista */
        .audio-container {
            margin: 20px 0;
            background: #222;
            padding: 10px;
            border-radius: 50px;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        footer { padding: 40px 20px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="audio-container">
        <p style="font-size: 12px; margin-bottom: 5px; color: var(--dorado);">Música de fondo:</p>
        <audio controls loop>
            <source src="Elatracon.mp3" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <header>
        <h1>EL TANO COMIDAS</h1>
        <p class="location"><i class="fas fa-map-marker-alt"></i> Las Flores, Buenos Aires</p>
        <div class="promo-badge">¡ENVÍOS GRATIS!</div>
    </header>

    <div class="container">
        
        <div class="menu-card">
            <div class="card-title">Nuestra Carta</div>
            <img src="1000848492.png" alt="Menú El Tano">
        </div>

        <div class="menu-card">
            <div class="card-title">Promociones para Compartir</div>
            <img src="1000848499.png" alt="Promociones El Tano">
        </div>

    </div>

    <footer>
        <p>Alias: ELTANOCOMIDASLF</p>
        <p>&copy; 2026 El Tano Comidas - Calidad y Sabor</p>
    </footer>

    <a href="https://wa.me/542244471112?text=Hola!%20Quiero%20hacer%20un%20pedido" class="btn-whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
